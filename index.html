<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE5 Scenario Tracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // UE5 Background Colors
                        'ue-darkest': 'var(--ue-bg-darkest)',
                        'ue-darker': 'var(--ue-bg-darker)',
                        'ue-dark': 'var(--ue-bg-dark)',
                        'ue-medium': 'var(--ue-bg-medium)',
                        'ue-lighter': 'var(--ue-bg-lighter)',
                        'ue-code': 'var(--ue-bg-code)',
                        // UE5 Border Colors
                        'ue-border-dark': 'var(--ue-border-dark)',
                        'ue-border-base': 'var(--ue-border-base)',
                        'ue-border-hover': 'var(--ue-border-hover)',
                        // UE5 Text Colors
                        'ue-text-primary': 'var(--ue-text-primary)',
                        'ue-text-secondary': 'var(--ue-text-secondary)',
                        'ue-text-tertiary': 'var(--ue-text-tertiary)',
                        'ue-text-muted': 'var(--ue-text-muted)',
                    },
                    boxShadow: {
                        'ue-neutral-glow': '0 0 15px var(--ue-neutral-glow)',
                        'ue-success-glow': '0 0 15px 4px var(--ue-success-glow)',
                    },
                    typography: {
                        DEFAULT: {
                            css: {
                                color: 'var(--ue-text-tertiary)',
                                strong: {
                                    color: 'var(--ue-text-primary)',
                                    fontWeight: '700',
                                },
                                code: {
                                    color: 'var(--ue-text-secondary)',
                                    backgroundColor: 'var(--ue-bg-code)',
                                    padding: '2px 6px',
                                    borderRadius: '4px',
                                    fontWeight: '400',
                                },
                                'code::before': {
                                    content: '""',
                                },
                                'code::after': {
                                    content: '""',
                                },
                            },
                        },
                        invert: {
                            css: {
                                color: 'var(--ue-text-tertiary)',
                                strong: {
                                    color: 'var(--ue-text-primary)',
                                },
                            },
                        },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="text-neutral-200 font-sans antialiased min-h-screen flex flex-col">

    <!-- Main Game -->
    <main id="game-container" class="flex-grow p-4 md:p-8 flex flex-col items-center">

        <!-- Header with UE5 Branding & Controls -->
        <div class="w-full max-w-7xl mb-4 flex justify-between items-center flex-wrap gap-4">
            <div class="flex items-center gap-4">
                <!-- UE5 Logo -->
                <img src="assets/icons/UE-Secondary-Logo-2023-Horizontal-White.svg" alt="Unreal Engine" class="h-8">
                <span class="text-neutral-500">|</span>
                <h1 class="text-2xl font-semibold text-neutral-100">Scenario Tracker</h1>
                <a href="launcher.html"
                    class="px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 rounded text-sm transition-colors"
                    title="Back to Launcher">🏠 Launcher</a>
                <a href="http://localhost:5000/"
                    class="px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 rounded text-sm transition-colors"
                    title="Open Generator">🤖 Generator</a>
            </div>

            <!-- Controls -->
            <div id="header-controls" class="flex-1 flex justify-end items-center space-x-4 min-w-[300px]">

                <!-- Countdown Timer -->
                <div class="text-right">
                    <span class="text-sm uppercase text-neutral-400">Time Remaining</span>
                    <div id="countdown-timer" class="text-3xl font-bold text-neutral-100">30:00</div>
                </div>

                <!-- Debug Mode Toggle Container (Hidden by default, activated by CTRL+SHIFT+DELETE) -->
                <div id="debug-controls-container" class="flex items-center space-x-2 pl-4 border-l border-neutral-700">
                    <input type="checkbox" id="debug-toggle"
                        class="form-checkbox h-4 w-4 text-emerald-500 bg-neutral-700 border-neutral-600 rounded focus:ring-emerald-500">
                    <label for="debug-toggle" class="text-sm font-medium text-neutral-300">Debug Mode</label>
                </div>

                <!-- Debug Dropdown Menu (Visible only when Debug Mode is ON) -->
                <div id="debug-dropdown"
                    class="absolute top-16 right-8 w-72 p-4 bg-neutral-800 rounded-lg shadow-xl border border-neutral-700 z-50 space-y-3 hidden">
                    <h4 class="text-lg font-semibold text-red-400 border-b border-neutral-700 pb-2">Admin Tools</h4>

                    <!-- Step Navigation -->
                    <div class="space-y-2">
                        <p class="text-xs text-neutral-400 uppercase tracking-wide">Step Navigation</p>
                        <div class="flex gap-2">
                            <button id="debug-prev-step"
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-1.5 rounded-lg text-sm">←
                                Prev</button>
                            <button id="debug-next-step"
                                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-1.5 rounded-lg text-sm">Next
                                →</button>
                        </div>
                        <button id="debug-skip-to-end"
                            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-1.5 rounded-lg text-sm">Skip
                            to Conclusion</button>
                        <div class="text-xs text-neutral-400 bg-neutral-700/50 p-2 rounded">Current: <span
                                id="debug-current-step" class="text-yellow-400">None</span></div>
                    </div>

                    <!-- Hard Reset -->
                    <div class="pt-2 border-t border-neutral-700">
                        <button id="hard-reset-btn"
                            class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-1.5 rounded-lg text-sm shadow-md transition-all duration-200">
                            Clear Cache & Restart
                        </button>
                    </div>
                </div>
            </div>
        </div>


        <!-- Main Jira-style Grid -->
        <div id="jira-board" class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-3 gap-6 flex-grow min-h-[70vh]">

            <!-- Column 1: Backlog -->
            <div id="backlog-column"
                class="md:col-span-1 bg-neutral-800 rounded-lg shadow-2xl overflow-hidden flex flex-col">
                <h2 class="text-xl font-semibold text-neutral-100 bg-neutral-700/50 p-4 border-b border-neutral-600">
                    Sprint Backlog
                </h2>
                <div id="backlog-list" class="p-4 space-y-3 overflow-y-auto">
                    <!-- Backlog tickets will be injected here by game.js -->
                </div>
            </div>

            <!-- Column 2: Ticket View -->
            <div id="ticket-view-column"
                class="md:col-span-2 bg-neutral-800 rounded-lg shadow-2xl overflow-hidden flex flex-col">
                <!-- Placeholder -->
                <div id="ticket-placeholder"
                    class="flex-grow flex flex-col items-center justify-center p-8 text-center">
                    <svg class="w-24 h-24 text-neutral-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-neutral-400">Select a ticket</h3>
                    <p class="text-neutral-500">Choose a ticket from the backlog on the left to get started.</p>
                </div>

                <!-- Active Ticket Content (hidden by default) -->
                <div id="ticket-content" class="hidden flex-grow flex-col">
                    <!-- Ticket Header -->
                    <div id="ticket-header" class="p-5 bg-neutral-700/50 border-b border-neutral-600">
                        <h3 id="ticket-title" class="text-2xl font-bold text-blue-300 mb-2"></h3>
                        <p id="ticket-description" class="text-sm text-neutral-400"></p>
                    </div>

                    <!-- Step Content Area -->
                    <div class="flex-grow p-6 overflow-y-auto">
                        <div id="ticket-step-content">
                            <!-- Screenshot Container -->
                            <div id="screenshot-container" class="screenshot-area mb-6 hidden">
                                <!-- Image injected via JS -->
                            </div>
                            <!-- Step prompt, feedback, and choices will be injected here -->
                        </div>
                    </div>
                </div>
            </div>

        </div> <!-- End Jira Grid -->

    </main>

    <!-- 'Time's Up' Screen / FINAL ASSESSMENT MODAL -->
    <div id="times-up-screen"
        class="hidden fixed inset-0 bg-neutral-900 bg-opacity-75 p-8 flex items-center justify-center z-50">
        <!-- Content will be dynamically injected here by showAssessmentModal -->
    </div>


    <!-- Load Scenario Data FIRST (using defer) -->
    <!-- <script src="questions.js" defer></script> --> <!-- OLD: Contains legacy scenario data -->

    <!-- Load Scenario Manifest (initializes window.SCENARIOS) -->
    <script src="scenarios/00_manifest.js" defer></script>

    <!-- Load All Generated Scenarios -->
    <script src="scenarios/directional_light.js" defer></script>

    <!-- Load Game Logic SECOND (using defer, ensuring it runs after scenarios) -->
    <script src="game.js" defer></script>
</body>

</html>
